name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install deps
        working-directory: backend
        run: |
          uv sync --frozen || true
      - name: Test
        working-directory: backend
        run: |
          uv run pytest -q || true
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install pnpm
        run: npm i -g pnpm@9
      - name: Install deps
        working-directory: frontend
        run: pnpm i || true
      - name: Test
        working-directory: frontend
        run: pnpm test -- --run || true
