[project]
name = "wikifi"
version = "0.1.0"
description = "Walk any codebase and produce a technology-agnostic markdown wiki of its intent"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "codeninja" }]
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.8",
]

[project.scripts]
wikifi = "wikifi.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["wikifi"]

[tool.hatch.build.targets.sdist]
include = ["wikifi", "README.md", "VISION.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --cov=wikifi --cov-report=term-missing --cov-fail-under=85"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
