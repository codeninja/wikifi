[project]
name = "wikifi"
version = "0.1.0"
description = "Walk any codebase and produce a technology-agnostic markdown wiki of its intent"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "codeninja" }]
dependencies = [
    "litellm",
    "pathspec",
    "pydantic",
    "pydantic-settings",
    "rich",
    "typer",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.12",
]

[project.scripts]
wikifi = "wikifi.main:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ['E501']
